name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GITLEAKS_VERSION: 8.30.1

jobs:
  gitleaks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Download and verify gitleaks
        run: |
          base="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL "${base}/${archive}" -o "${archive}"
          curl -sSfL "${base}/gitleaks_${GITLEAKS_VERSION}_checksums.txt" -o gitleaks.checksums
          grep " ${archive}\$" gitleaks.checksums | sha256sum -c -
          tar -xzf "${archive}" gitleaks
          chmod +x gitleaks

      - name: Scan pull request commit range
        if: github.event_name == 'pull_request'
        run: |
          ./gitleaks git \
            --config .gitleaks.toml \
            --no-banner \
            --redact \
            --log-opts "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"

      - name: Scan full history
        if: github.event_name == 'push'
        run: |
          ./gitleaks git \
            --config .gitleaks.toml \
            --no-banner \
            --redact

  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Read .nvmrc
        id: nvmrc
        run: echo "version=$(cat .nvmrc)" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.nvmrc.outputs.version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit summary (report only, never fails)
        run: npm audit || true

      # Gates on production deps only. All vulnerable packages here (vitepress,
      # vite, esbuild) are devDependencies with dev-server-only advisories and no
      # upstream fix while vitepress pins vite 5 — they never ship to the static
      # site. `npm run audit` === `npm audit --omit=dev --audit-level=high`.
      - name: Audit gate (fail on high or critical in production deps)
        run: npm run audit
